events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    server {
        listen 80; # Nginx escuchará en el puerto 80 dentro del contenedor
        server_name localhost; # O el dominio de tu aplicación

        # Directorio donde se servirán los archivos estáticos
        root /usr/share/nginx/html;
        index index.html index.htm;

        # Manejo de la SPA (History API Fallback)
        # Si no encuentra un archivo, intenta servir index.html
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Manejo de errores (opcional)
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}