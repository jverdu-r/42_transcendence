<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emparejamiento de Jugadores</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f4f8;
            padding: 1rem;
        }
        .container {
            background-color: #ffffff;
            padding: 2.5rem;
            border-radius: 1rem;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 450px;
        }
        .input-field {
            padding: 0.75rem 1rem;
            border: 1px solid #cbd5e1;
            border-radius: 0.5rem;
            width: 100%;
            transition: border-color 0.2s ease-in-out;
        }
        .input-field:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.25);
        }
        .submit-button {
            background-color: #3b82f6;
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s ease-in-out, transform 0.1s ease-in-out;
            width: 100%;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            border: none;
        }
        .submit-button:hover:not(:disabled) {
            background-color: #2563eb;
            transform: translateY(-1px);
        }
        .submit-button:disabled {
            background-color: #9ca3af;
            cursor: not-allowed;
            transform: none;
        }
        .submit-button:active {
            transform: translateY(0);
        }
        .response-message {
            margin-top: 1.5rem;
            padding: 1rem;
            border-radius: 0.5rem;
            background-color: #e0f2fe;
            border: 1px solid #90cdf4;
            color: #2b6cb0;
            font-size: 0.95rem;
            text-align: center;
            font-weight: 500;
            word-wrap: break-word;
        }
        .success {
            background-color: #d1fae5;
            border-color: #10b981;
            color: #065f46;
        }
        .error {
            background-color: #fee2e2;
            border-color: #ef4444;
            color: #991b1b;
        }
        .waiting {
            background-color: #fef3c7;
            border-color: #f59e0b;
            color: #92400e;
        }
    </style>
</head>
<body>
    <div class="container flex flex-col items-center">
        <h1 class="text-3xl font-bold text-gray-800 mb-6 text-center">Sistema de Emparejamiento</h1>
        
        <form id="greetForm" class="w-full space-y-4">
            <div>
                <label for="username" class="block text-gray-700 text-sm font-medium mb-2">Nombre de Usuario:</label>
                <input type="text" id="username" name="username" placeholder="Introduce tu nombre (ej: Juan, Marcos)" required
                       class="input-field focus:ring-blue-500 focus:border-blue-500">
            </div>
            <button type="submit" id="submitButton" class="submit-button focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2">
                Buscar Oponente
            </button>
        </form>

        <div id="response" class="response-message hidden">
            <!-- Mensajes del sistema aparecerán aquí -->
        </div>
    </div>

    <script>
        // Referencias a elementos del DOM
        const greetForm = document.getElementById('greetForm');
        const usernameInput = document.getElementById('username');
        const submitButton = document.getElementById('submitButton');
        const responseDiv = document.getElementById('response');
        let ws = null;

        // Función para actualizar el mensaje de respuesta
        function updateResponseMessage(message, type = 'info') {
            responseDiv.classList.remove('hidden');
            
            // Limpia todas las clases de tipo
            responseDiv.classList.remove('success', 'error', 'waiting');
            
            // Aplica la clase apropiada según el tipo
            if (type === 'error') {
                responseDiv.classList.add('error');
            } else if (type === 'success') {
                responseDiv.classList.add('success');
            } else if (type === 'waiting') {
                responseDiv.classList.add('waiting');
            }
            
            responseDiv.textContent = message;
        }

        // Función para habilitar/deshabilitar controles
        function toggleControls(disabled) {
            usernameInput.disabled = disabled;
            submitButton.disabled = disabled;
            submitButton.textContent = disabled ? 'Conectando...' : 'Buscar Oponente';
        }

        // Manejador del formulario
        greetForm.addEventListener('submit', async (event) => {
            event.preventDefault();

            const username = usernameInput.value.trim();
            if (!username) {
                updateResponseMessage('Por favor, introduce un nombre de usuario.', 'error');
                return;
            }

            // Deshabilita controles mientras se conecta
            toggleControls(true);
            updateResponseMessage('Conectando al servidor...', 'waiting');

            // Cierra conexión existente si la hay
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.close();
            }

            // Establece nueva conexión WebSocket
            ws = new WebSocket('ws://localhost:3000/ws');

            ws.onopen = () => {
                console.log('Conexión WebSocket establecida');
                // Envía el mensaje de unirse al juego
                ws.send(JSON.stringify({ type: 'join-game', name: username }));
                updateResponseMessage(`Conectado como ${username}. Buscando oponente...`, 'waiting');
            };

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                console.log('Mensaje recibido:', data);

                switch (data.type) {
                    case 'status':
                        if (data.message === 'Estoy vivo') {
                            console.log('Servidor confirmado como activo');
                        }
                        break;
                        
                    case 'waiting':
                        updateResponseMessage(data.message || `Esperando oponente para ${username}...`, 'waiting');
                        break;
                        
                    case 'opponentFound':
                        updateResponseMessage(
                            `¡Oponente encontrado! Tu oponente es: ${data.opponent}`, 
                            'success'
                        );
                        toggleControls(false); // Re-habilita controles
                        
                        // Opcional: cerrar conexión después del emparejamiento
                        setTimeout(() => {
                            if (ws) {
                                ws.close();
                            }
                        }, 3000);
                        break;
                        
                    case 'error':
                        updateResponseMessage(`Error: ${data.message}`, 'error');
                        toggleControls(false);
                        if (ws) ws.close();
                        break;
                        
                    default:
                        console.warn('Mensaje desconocido:', data);
                        updateResponseMessage(`Mensaje desconocido del servidor`, 'error');
                }
            };

            ws.onclose = () => {
                console.log('Conexión WebSocket cerrada');
                toggleControls(false);
                
                // Solo muestra mensaje de desconexión si no hay un mensaje de éxito visible
                if (!responseDiv.classList.contains('success')) {
                    updateResponseMessage('Desconectado del servidor. Puedes intentar de nuevo.', 'error');
                }
            };

            ws.onerror = (error) => {
                console.error('Error WebSocket:', error);
                updateResponseMessage('Error de conexión. Verifica que el servidor esté funcionando.', 'error');
                toggleControls(false);
            };
        });

        // Limpia la conexión cuando se cierra la página
        window.addEventListener('beforeunload', () => {
            if (ws) {
                ws.close();
            }
        });
    </script>
</body>
</html>
